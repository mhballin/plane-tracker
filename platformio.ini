[platformio]
dotenv_path = .env

; PlatformIO Project Configuration File

[env:full]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino
build_type = debug
board_build.use_psram = true
extra_scripts = pre:extra_script.py

; Force upload port
upload_port = /dev/cu.usbserial-110
monitor_port = /dev/cu.usbserial-110

; Build settings - 4MB flash with minimal SPIFFS for maximum app space
board_build.flash_size = 4MB
board_build.partitions = min_spiffs.csv
board_upload.flash_size = 4MB

; Memory settings - ESP32-S3 with PSRAM
board_build.memory_type = qio_qspi

board_build.f_flash = 80000000L
board_build.filesystem = spiffs
board_build.arduino.memory_type = qio_opi

; Upload settings - Moderate speed for reliability
upload_speed = 460800
monitor_speed = 115200
upload_resetmethod = nodemcu

; Build flags for ESP32-S3
build_flags = 
    -I src
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    ; -DBOARD_HAS_PSRAM   ; disabled to avoid forcing PSRAM on boards where wiring/size differs
    ; Enable the display-only smoke test by default for this env. Remove if running full app.
    ; -DSMOKE_TEST  ; DISABLED - Running full application
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Re-enable PSRAM at build-time if your board has PSRAM (Elecrow/CrowPanel commonly do)
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_SUPPORT=1
    ; Hint for PlatformIO to enable psram usage on some boards
    ; board_build.use_psram = true
    ; LVGL configuration
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_USE_DRAW_SW_ASM=0
    ; Inject Wi-Fi credentials from .env via build_flags
    -DWIFI_SSID_MACRO=\"${env:WIFI_SSID}\"
    -DWIFI_PASSWORD_MACRO=\"${env:WIFI_PASSWORD}\"
    ; Inject additional secrets/user settings from .env
    -DOPENWEATHER_API_KEY_MACRO=\"${env:OPENWEATHER_API_KEY}\"
    -DWEATHER_CITY_MACRO=\"${env:WEATHER_CITY}\"
    -DOPENSKY_CLIENT_ID_MACRO=\"${env:OPENSKY_CLIENT_ID}\"
    -DOPENSKY_CLIENT_SECRET_MACRO=\"${env:OPENSKY_CLIENT_SECRET}\"
    -DHOME_LAT_MACRO=${env:HOME_LAT}
    -DHOME_LON_MACRO=${env:HOME_LON}

; Libraries
lib_deps = 
    lovyan03/LovyanGFX@1.1.16
    bblanchon/ArduinoJson@^7.2.0
    lvgl/lvgl@^9.2.2

; Exclude ARM-specific assembly from LVGL (Helium is ARM Cortex-M only)
lib_ldf_mode = deep+
lib_compat_mode = strict

; Monitor filters
monitor_filters = 
    colorize
    time
    log2file
